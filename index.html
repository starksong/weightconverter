<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Weight Converter</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f0f2f5;
            --danger-color: #ff3b30;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #1d1d1f; margin-bottom: 25px; letter-spacing: -0.5px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #86868b; font-size: 13px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear { background-color: #f5f5f7; color: var(--danger-color); }
        .btn-clear:hover { background-color: #e8e8ed; }

        .history-section { margin-top: 30px; }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .history-header h3 { font-size: 15px; color: #1d1d1f; margin: 0; }
        .btn-del-all { font-size: 12px; color: #007aff; background: none; padding: 0; width: auto; cursor: pointer; border-radius: 0; }
        .btn-del-all:hover { text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #86868b; padding: 10px 8px; border-bottom: 1px solid #f0f0f0; font-weight: 500; }
        td { padding: 12px 8px; border-bottom: 1px solid #f9f9f9; color: #333; }
        .record-time { color: #86868b; font-size: 11px; text-align: right; }
        tr:first-child td { font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <h2>Weight Converter</h2>
    
    <div class="grid">
        <div class="input-group">
            <label>Kilograms (KG)</label>
            <input type="number" id="kg" placeholder="0.00" oninput="handleInput('kg')">
        </div>
        <div class="input-group">
            <label>Pounds (LB)</label>
            <input type="number" id="lb" placeholder="0.00" oninput="handleInput('lb')">
        </div>
    </div>

    <div class="grid">
        <div class="input-group">
            <label>Grams (G)</label>
            <input type="number" id="g" placeholder="0" oninput="handleInput('g')">
        </div>
        <div class="input-group">
            <label>Ounces (OZ)</label>
            <input type="number" id="oz" placeholder="0.00" oninput="handleInput('oz')">
        </div>
    </div>

    <div class="button-group">
        <button class="btn-clear" onclick="clearInputs()">Clear All Fields</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h3>Recent Activity (Max 10)</h3>
            <button class="btn-del-all" onclick="clearHistory()">Clear History</button>
        </div>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>KG</th>
                    <th>LB</th>
                    <th style="text-align: right;">Time</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const units = { kg: 1000, g: 1, lb: 453.59237, oz: 28.34952 };
    let history = JSON.parse(localStorage.getItem('weightHistory')) || [];

    updateHistoryTable();

    let timer;
    function handleInput(source) {
        const value = document.getElementById(source).value;
        if (value === "") {
            clearInputs(false);
            return;
        }

        const amount = parseFloat(value);
        const grams = amount * units[source];

        for (let unit in units) {
            if (unit !== source) {
                const result = grams / units[unit];
                document.getElementById(unit).value = result < 0.01 ? result.toFixed(4) : result.toFixed(2);
            }
        }

        clearTimeout(timer);
        timer = setTimeout(() => {
            saveRecord();
        }, 1000); 
    }

    function saveRecord() {
        const kg = document.getElementById('kg').value;
        const lb = document.getElementById('lb').value;
        
        if (!kg || !lb) return;

        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const newRecord = { kg, lb, time: timeStr };
        history.unshift(newRecord);

        if (history.length > 10) {
            history = history.slice(0, 10);
        }

        localStorage.setItem('weightHistory', JSON.stringify(history));
        updateHistoryTable();
    }

    function updateHistoryTable() {
        const body = document.getElementById('historyBody');
        body.innerHTML = history.map(item => `
            <tr>
                <td>${item.kg} kg</td>
                <td>${item.lb} lb</td>
                <td class="record-time">${item.time}</td>
            </tr>
        `).join('');
    }

    function clearInputs(clearAll = true) {
        ['kg', 'lb', 'g', 'oz'].forEach(id => {
            document.getElementById(id).value = "";
        });
        clearTimeout(timer);
    }

    function clearHistory() {
        if(confirm("Are you sure you want to delete all history?")) {
            history = [];
            localStorage.removeItem('weightHistory');
            updateHistoryTable();
        }
    }
</script>

</body>
</html>
